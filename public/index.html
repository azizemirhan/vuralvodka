<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vural Vodka — Coming Soon</title>
<meta name="description" content="Vural Vodka — Ultra Premium, handcrafted, organic. A new era awaits you." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   VURAL VODKA — Demnächst
   Aesthetic: Editorial heritage · Archival paper · Distilled quiet
   ========================================================= */

:root {
  --ink:     #1d1d1b;
  --red:     #bb2f35;
  --red-hi:  #a82930;
  --gray-2:  #5c5c5b;
  --gray-3:  #b3b0af;

  --paper:       #fbfaf6;
  --paper-warm:  #f5f2ea;
  --rule:        #dcd9d2;
  --rule-soft:   #ebe8e0;

  --f-display: "Fraunces", "Times New Roman", serif;
  --f-sans:    "Archivo", "Helvetica Neue", sans-serif;

  --ease:  cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease2: cubic-bezier(0.65, 0.05, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow-x: hidden; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-display);
  font-weight: 400;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  position: relative;
}

/* ---------- Paper atmosphere ---------- */

.paper-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(187, 47, 53, 0.03) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(29, 29, 27, 0.04) 0%, transparent 60%),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
}

.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.7;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.11  0 0 0 0 0.11  0 0 0 0 0.10  0 0 0 0.45 0'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='0.55'/></svg>");
}

/* Ambient videos — mobile’da biraz daha görünür; wash ile okunabilirlik */
.bg-mobile-video,
.bg-desktop-video {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
  min-height: 100%;
  min-height: -webkit-fill-available; /* iOS address bar / safe viewport */
  object-fit: cover;
  pointer-events: none;
  opacity: 1;
  filter: brightness(0.93) saturate(0.98);
  -webkit-filter: brightness(0.93) saturate(0.98);
  /* inline default can collapse height on iOS; block + explicit fill */
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}

@media (min-width: 961px) {
  .bg-desktop-video { display: block; }

  .paper-bg {
    z-index: 1;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(187, 47, 53, 0.04) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(29, 29, 27, 0.05) 0%, transparent 60%),
      /* biraz daha saydam: video hâlâ “ambient” ama okunur */
      linear-gradient(180deg, rgba(251, 250, 246, 0.86) 0%, rgba(245, 242, 234, 0.84) 100%);
  }

  .grain  { z-index: 2; }
  .frame  { z-index: 3; }
  main    { z-index: 4; }
}

/* ---------- Hairline frame ---------- */

.frame {
  position: fixed;
  inset: 22px;
  z-index: 2;
  pointer-events: none;
  border: 1px solid var(--rule);
  opacity: 0;
  animation: fade-in 1.6s var(--ease) 0.15s forwards;
}

/* ---------- Top rail ---------- */

.rail {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 44px 62px 0;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  z-index: 6;
  font-family: var(--f-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gray-2);
}

.rail .r-left { display: flex; align-items: center; gap: 14px; justify-self: start; opacity: 0; animation: fade-in 1.2s var(--ease) 0.55s forwards; }
.rail .lang-switch { grid-column: 2; justify-self: center; }

.rail .bullet {
  width: 4px; height: 4px;
  background: var(--red);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ---------- Language switcher ---------- */

.lang-switch {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gray-2);
  opacity: 0;
  animation: fade-in 1.2s var(--ease) 0.55s forwards;
}

.lang-switch button {
  appearance: none;
  -webkit-appearance: none;
  background: none;
  border: 0;
  padding: 4px 2px;
  margin: 0;
  font: inherit;
  letter-spacing: inherit;
  text-transform: inherit;
  color: var(--gray-3);
  cursor: pointer;
  line-height: 1;
  transition: color 0.3s var(--ease);
}

.lang-switch button:hover,
.lang-switch button:focus-visible {
  color: var(--ink);
  outline: none;
}

.lang-switch button[aria-current="true"] {
  color: var(--ink);
}

.lang-switch .lang-sep {
  color: var(--rule);
  opacity: 0.9;
}

@media (max-width: 640px) {
  .lang-switch { font-size: 9px; letter-spacing: 0.25em; gap: 8px; }
}

/* ---------- Main stage ---------- */

main {
  position: relative;
  z-index: 3;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 80px;
}

.stage {
  width: 100%;
  max-width: 820px;
  text-align: center;
  position: relative;
}

/* ---------- Logo block ---------- */

.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
  opacity: 0;
  transform: translateY(14px);
  animation: rise 1.4s var(--ease) 0.4s forwards;
}

.logo-wrap .pre {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--f-sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--gray-2);
}

.logo-wrap .pre .line {
  width: 48px;
  height: 1px;
  background: var(--rule);
}

.logo {
  width: clamp(180px, 22vw, 290px);
  height: auto;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}

/* ---------- Italic tagline ---------- */

.tagline {
  margin-top: 6px;
  font-family: var(--f-display);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(16px, 1.6vw, 20px);
  color: var(--gray-2);
  letter-spacing: 0.01em;
  opacity: 0;
  animation: rise 1.2s var(--ease) 1.1s forwards;
}

/* ---------- Ornamental divider ---------- */

.ornament {
  margin: 44px auto 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  opacity: 0;
  animation: fade-in 1.2s var(--ease) 1.45s forwards;
}

.ornament .rule {
  width: 90px;
  height: 1px;
  background: var(--ink);
}

.ornament .star {
  width: 16px;
  height: 16px;
  color: var(--red);
  flex-shrink: 0;
}

/* ---------- Announcement ---------- */

.announce {
  font-family: var(--f-display);
  font-variation-settings: "opsz" 144, "SOFT" 30;
  font-weight: 400;
  font-size: clamp(42px, 6.8vw, 92px);
  line-height: 1.02;
  letter-spacing: -0.015em;
  color: var(--ink);
  opacity: 0;
  animation: rise 1.4s var(--ease) 1.6s forwards;
}

.announce .it {
  font-style: italic;
  font-weight: 300;
  color: var(--gray-2);
}

/* ---------- CTA ---------- */

.cta-wrap {
  margin-top: 56px;
  display: flex;
  justify-content: center;
  opacity: 0;
  animation: rise 1.2s var(--ease) 2.1s forwards;
}

.cta {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 16px;
  padding: 20px 40px;
  font-family: var(--f-sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--paper);
  text-decoration: none;
  background: var(--ink);
  border: 1px solid var(--ink);
  overflow: hidden;
  isolation: isolate;
  transition:
    color 0.5s var(--ease),
    letter-spacing 0.6s var(--ease),
    background 0.5s var(--ease),
    border-color 0.5s var(--ease);
}

.cta::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--red);
  transform: translateY(101%);
  transition: transform 0.55s var(--ease2);
  z-index: -1;
}

.cta:hover {
  letter-spacing: 0.5em;
  border-color: var(--red);
}
.cta:hover::before { transform: translateY(0); }

.cta .arrow {
  position: relative;
  display: inline-block;
  width: 34px;
  height: 1px;
  background: currentColor;
  transition: width 0.5s var(--ease);
}
.cta .arrow::after {
  content: "";
  position: absolute;
  right: 0; top: 50%;
  width: 7px; height: 7px;
  border-top: 1px solid currentColor;
  border-right: 1px solid currentColor;
  transform: translateY(-50%) rotate(45deg);
}
.cta:hover .arrow { width: 48px; }

/* ---------- Footer ---------- */

.footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 0 62px 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: var(--f-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gray-2);
  z-index: 5;
  opacity: 0;
  animation: fade-in 1.4s var(--ease) 2.4s forwards;
}

.footer .f-left,
.footer .f-right { display: flex; align-items: center; gap: 12px; }

.footer .sq {
  width: 4px; height: 4px;
  background: var(--red);
  transform: rotate(45deg);
}

.footer .mini {
  color: var(--gray-3);
  font-weight: 400;
  letter-spacing: 0.25em;
}

/* ---------- Animations ---------- */

@keyframes fade-in { to { opacity: 1; } }

@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(0.92); opacity: 0.85; }
}

.ornament .star { animation: pulse 4.8s ease-in-out infinite 3s; transform-origin: center; }

/* ---------- Product flanks (desktop) — bottle2 sol, bottle sağ ---------- */
.product-flank {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: visible;
}

.product-flank__img {
  position: absolute;
  bottom: 4%;
  width: auto;
  /* taban oranına ~2.1× */
  height: min(calc(58vh * 2.1), 1008px);
  max-width: min(calc(32vw * 2.1), 504px);
  object-fit: contain;
  object-position: center bottom;
  user-select: none;
  -webkit-user-drag: none;
  filter: drop-shadow(0 28px 56px rgba(0, 0, 0, 0.08));
  opacity: 0;
  animation: fade-in 1.5s var(--ease) 0.7s forwards;
}

.product-flank__img--left {
  left: max(16px, 4vw);
  transform: translateX(0);
}

.product-flank__img--right {
  right: max(16px, 4vw);
  transform: translateX(0);
}

@media (min-width: 961px) {
  .product-flank { display: block; }
}

/* ---------- Responsive ---------- */

@media (max-width: 960px) {
  .bg-mobile-video {
    display: block;
    opacity: 0.58;
    filter: brightness(0.98) saturate(1);
    -webkit-filter: brightness(0.98) saturate(1);
  }

  /* Daha ince yıkama: şişe / hareket küçük ekranda da seçilsin; tip hâlâ yeterli kontrastta */
  .paper-bg {
    z-index: 1;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(187, 47, 53, 0.04) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(29, 29, 27, 0.05) 0%, transparent 60%),
      linear-gradient(180deg, rgba(251, 250, 246, 0.72) 0%, rgba(245, 242, 234, 0.68) 100%);
  }

  .grain         { z-index: 2; opacity: 0.28; }
  .product-flank { display: block; z-index: 2; }
  .product-flank__img {
    height: min(38vh, 320px);
    max-width: 36vw;
    bottom: 4%;
    filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.07));
    opacity: 0;
    animation: fade-in 1.5s var(--ease) 0.7s forwards;
  }
  .product-flank__img--left  { left: auto;  right: calc(50% + 2vw); }
  .product-flank__img--right { right: auto; left:  calc(50% + 2vw); }

  .frame         { z-index: 3; inset: 14px; }
  main            { z-index: 4; padding: 72px 36px 46vh; align-items: flex-start; }
  .stage         { margin-top: 2vh; }

  .rail   { padding: 28px 32px 0; }
  .footer { padding: 0 32px 26px; }
}

@media (max-width: 640px) {
  .rail, .footer { font-size: 9px; letter-spacing: 0.25em; }
  .cta { padding: 18px 30px; font-size: 10px; letter-spacing: 0.36em; }
  .ornament { margin: 36px auto 30px; }
  .ornament .rule { width: 60px; }
  .tagline { font-size: 15px; }

  main           { padding: 68px 24px 42vh; }
  .stage         { margin-top: 1vh; }

  .product-flank__img {
    height: min(32vh, 260px);
    max-width: 32vw;
    bottom: 3%;
    opacity: 0;
    animation: fade-in-dim 1.5s var(--ease) 0.7s forwards;
  }
  .product-flank__img--left  { left: auto;  right: calc(50% + 1.5vw); }
  .product-flank__img--right { right: auto; left:  calc(50% + 1.5vw); }
}

@keyframes fade-in-dim {
  from { opacity: 0; }
  to   { opacity: 0.9; }
}

@media (prefers-reduced-motion: reduce) {
  .bg-mobile-video,
  .bg-desktop-video { display: none !important; }

  @media (max-width: 960px) {
    .paper-bg {
      background:
        radial-gradient(ellipse at 20% 10%, rgba(187, 47, 53, 0.03) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(29, 29, 27, 0.04) 0%, transparent 60%),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
    }
  }

  @media (min-width: 961px) {
    .paper-bg {
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(187, 47, 53, 0.03) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(29, 29, 27, 0.04) 0%, transparent 60%),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
    }

    .grain  { z-index: 1; }
    .frame  { z-index: 2; }
    main    { z-index: 3; }
  }

  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

<script>
(function () {
  /* ---- i18n (EN / DE / RU) ---- */
  var SUPPORTED = ['en', 'de', 'ru'];
  var STORAGE_KEY = 'vv.lang';
  var DEFAULT_LANG = 'en';
  var dict = {};

  try {
    var raw = document.getElementById('i18n-data');
    if (raw) dict = JSON.parse(raw.textContent || '{}');
  } catch (e) { dict = {}; }

  function pickLang() {
    var saved;
    try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) {}
    if (saved && SUPPORTED.indexOf(saved) !== -1) return saved;
    var nav = (navigator.language || navigator.userLanguage || '').toLowerCase().slice(0, 2);
    if (SUPPORTED.indexOf(nav) !== -1) return nav;
    return DEFAULT_LANG;
  }

  function applyLang(lang) {
    if (SUPPORTED.indexOf(lang) === -1) lang = DEFAULT_LANG;
    var d = dict[lang] || {};

    document.documentElement.setAttribute('lang', lang);

    if (d['doc.title']) document.title = d['doc.title'];
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc && d['doc.desc']) metaDesc.setAttribute('content', d['doc.desc']);

    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (d[key] != null) el.textContent = d[key];
    });

    var nav = document.querySelector('.lang-switch');
    if (nav && d['lang.aria']) nav.setAttribute('aria-label', d['lang.aria']);

    document.querySelectorAll('.lang-switch [data-lang]').forEach(function (btn) {
      if (btn.dataset.lang === lang) btn.setAttribute('aria-current', 'true');
      else btn.removeAttribute('aria-current');
    });

    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
  }

  function initI18n() {
    applyLang(pickLang());
    document.querySelectorAll('.lang-switch [data-lang]').forEach(function (btn) {
      btn.addEventListener('click', function () { applyLang(btn.dataset.lang); });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initI18n);
  } else {
    initI18n();
  }
})();
</script>

<script>
(function () {
  /* iOS / Safari: muted inline video often needs a programmatic .play() + retry after load */
  function tryPlayVideo(v) {
    if (!v || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    v.muted = true;
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    var p = v.play();
    if (p && typeof p.catch === 'function') p.catch(function () {});
  }
  function kickBgVideos() {
    document.querySelectorAll('.bg-mobile-video, .bg-desktop-video').forEach(tryPlayVideo);
  }
  function wireVideo(v) {
    if (!v) return;
    tryPlayVideo(v);
    v.addEventListener('loadeddata', function () { tryPlayVideo(v); });
    v.addEventListener('canplay', function () { tryPlayVideo(v); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.bg-mobile-video, .bg-desktop-video').forEach(wireVideo);
    });
  } else {
    document.querySelectorAll('.bg-mobile-video, .bg-desktop-video').forEach(wireVideo);
  }
  window.addEventListener('pageshow', function (e) { if (e.persisted) kickBgVideos(); });
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') kickBgVideos();
  });

  const logo = document.querySelector('.logo');
  const paper = document.querySelector('.paper-bg');
  if (!logo) return;

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) return;

  const mqMobile = window.matchMedia('(max-width: 960px)');

  let tx = 0, ty = 0, cx = 0, cy = 0;

  window.addEventListener('pointermove', (e) => {
    const nx = e.clientX / window.innerWidth  - 0.5;
    const ny = e.clientY / window.innerHeight - 0.5;
    tx = nx * 6;
    ty = ny * 4;
  }, { passive: true });

  function tick() {
    cx += (tx - cx) * 0.05;
    cy += (ty - cy) * 0.05;
    logo.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
    /* Mobilde .paper-bg transform’u Safari’de video ile katman/clip sorununa yol açabiliyor; sadece desktop’ta parallax */
    if (paper && !mqMobile.matches) {
      paper.style.transform = `translate3d(${cx * -0.4}px, ${cy * -0.4}px, 0)`;
    } else if (paper) {
      paper.style.transform = '';
    }
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
